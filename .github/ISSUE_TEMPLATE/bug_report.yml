name: Bug report
description: File a bug report to help us improve
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction if possible.
      placeholder: 1) … 2) … 3) …
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g., v0.1.0 or commit SHA
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: OS, Node, browser
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell

