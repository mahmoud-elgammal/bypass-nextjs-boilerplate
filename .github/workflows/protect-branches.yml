name: Protect Branches

on:
  workflow_dispatch:

jobs:
  protect:
    runs-on: ubuntu-latest
    steps:
      - name: Configure branch protection (requires ADMIN_TOKEN)
        uses: actions/github-script@v7
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        with:
          github-token: ${{ env.ADMIN_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branches = [
              { name: 'main', required_contexts: ['test', 'e2e', 'storybook', 'lighthouse'] },
              { name: 'beta', required_contexts: ['test', 'e2e', 'storybook', 'lighthouse'] },
              { name: 'alpha', required_contexts: ['test', 'e2e', 'storybook', 'lighthouse'] },
            ];

            for (const b of branches) {
              await github.request('PUT /repos/{owner}/{repo}/branches/{branch}/protection', {
                owner,
                repo,
                branch: b.name,
                required_status_checks: {
                  strict: true,
                  contexts: b.required_contexts,
                },
                enforce_admins: true,
                required_pull_request_reviews: {
                  required_approving_review_count: 1,
                  dismiss_stale_reviews: true,
                },
                restrictions: null,
                required_linear_history: true,
                allow_force_pushes: false,
                allow_deletions: false,
                block_creations: false,
              });
            }
            core.info('Branch protection configured.');
