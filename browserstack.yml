server: "local"
auth:
  username: ${BROWSERSTACK_USERNAME}
  access_key: ${BROWSERSTACK_ACCESS_KEY}

run_settings:
  framework: "playwright"
  project_name: "next-edge"
  build_name: "playwright-crossbrowser"
  source: "github-actions"
  parallels: 4
  test_suite: "e2e"
  test_framework: "playwright/test"
  npm_dependencies:
    - "@playwright/test@^1.49.0"
  package_manager: "pnpm"
  package_manager_args: "--frozen-lockfile"
  command: "pnpm test:e2e"

platforms:
  - os: "Windows"
    osVersion: "11"
    browserName: "chrome"
    browserVersion: "latest"
  - os: "OS X"
    osVersion: "Sonoma"
    browserName: "safari"
    browserVersion: "latest"
  - os: "Windows"
    osVersion: "11"
    browserName: "firefox"
    browserVersion: "latest"
  - deviceName: "iPhone 15"
    osVersion: "16"
    browserName: "safari"
    deviceOrientation: "portrait"
  - deviceName: "Samsung Galaxy S23"
    osVersion: "13.0"
    browserName: "chrome"
    deviceOrientation: "portrait"

connection_settings:
  local: true
  local_identifier: "bs-local"

disable_usage_reporting: true

