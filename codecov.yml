codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: 60..100
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: auto
        threshold: 2%

ignore:
  - "**/*.d.ts"
  - "**/__tests__/**"
  - "node_modules/**"
  - ".next/**"
