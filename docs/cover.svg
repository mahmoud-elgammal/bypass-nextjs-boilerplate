<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840" role="img" aria-labelledby="title desc">
  <title id="title">Next Edge – Production-ready Next.js App Router Starter</title>
  <desc id="desc">A clean social banner for the Next Edge boilerplate showcasing its focus on performance, security, and great DX.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="840" fill="url(#g)"/>

  <g opacity="0.25" filter="url(#glow)">
    <circle cx="250" cy="150" r="180" fill="url(#accent)"/>
    <circle cx="1450" cy="700" r="220" fill="url(#accent)"/>
  </g>

  <g transform="translate(140, 260)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, 'Apple Color Emoji', 'Segoe UI Emoji'" font-size="84" font-weight="800" fill="#e5e7eb">Next Edge</text>
    <rect x="0" y="30" width="380" height="16" fill="url(#accent)" opacity="0.35"/>
  </g>

  <g transform="translate(140, 360)" fill="#cbd5e1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial">
    <text x="0" y="0" font-size="28">Production‑ready Next.js App Router starter</text>
    <text x="0" y="48" font-size="22">• Secure defaults (CSP, CSRF) • next‑international • Storybook • Vitest • Playwright</text>
    <text x="0" y="86" font-size="22">• next‑seo • Lighthouse CI • Semantic Release • Renovate</text>
  </g>

  <g transform="translate(140, 540)">
    <rect rx="8" ry="8" width="420" height="52" fill="#0ea5e9"/>
    <text x="24" y="34" font-size="22" font-weight="700" fill="#0b1220" font-family="ui-sans-serif, system-ui">pnpm dev  •  localhost:3000</text>
  </g>
</svg>

