pre-commit:
  parallel: true
  commands:
    biome_check:
      glob: "**/*.{ts,tsx,js,jsx,css,json}"
      run: pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm exec tsc -p tsconfig.json --noEmit
    i18n:
      run: pnpm i18n:check

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit ${LEFTHOOK_MSG_FILE:-$1}